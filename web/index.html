<!DOCTYPE html>
<html>
<head>
    <title>Voice</title>
    <style>
        body {
            margin: 8px;
            font-family: Arial, sans-serif;
            text-align: center;
            width: 140px;
        }

        #mic {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: #4285f4;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        #mic.listening {
            background: #ea4335;
        }

        #log {
            margin-top: 8px;
            font-size: 11px;
            text-align: left;
            max-height: 80px;
            overflow-y: auto;
        }
    </style>
</head>

<body>

<button id="mic" onclick="start()">🎤</button>

<div id="log"></div>

<script src="/eel.js"></script>

<script>
    function start() {
        document.getElementById("mic").classList.add("listening");
        eel.startListening()();
    }

    function updateUI(cmd, res) {
        const mic = document.getElementById("mic");
        mic.classList.remove("listening");

        const log = document.getElementById("log");
        const item = document.createElement("div");
        item.textContent = cmd + " → " + res;

        log.prepend(item);
    }

    eel.expose(updateUI);
</script>

</body>
</html>
